<!doctype html>
<html lang="id">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Kopi Ayu - Reservasi</title>

        <!-- CSS FILES -->            
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,400;0,600;0,700;1,200;1,700&display=swap" rel="stylesheet">
            
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="css/bootstrap-icons.css" rel="stylesheet">
        <link href="css/vegas.min.css" rel="stylesheet">
        <link href="css/tooplate-barista.css" rel="stylesheet">
    </head>
    
    <body class="reservation-page">
            
        <main>
            <nav class="navbar navbar-expand-lg">                
                <div class="container">
                    <a class="navbar-brand d-flex align-items-center" href="index.html">
    <img src="images/coffee-beans.png" class="navbar-brand-image img-fluid" alt="">
    Kopi Ayu
</a>
    
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
    
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-lg-auto">
                            <li class="nav-item"><a class="nav-link" href="index.html#section_1">Beranda</a></li>
                            <li class="nav-item"><a class="nav-link" href="index.html#section_2">Tentang Kami</a></li>
                            <li class="nav-item"><a class="nav-link" href="index.html#section_3">Menu</a></li>
                            <li class="nav-item"><a class="nav-link" href="index.html#section_4">Testimoni</a></li>
                            <li class="nav-item"><a class="nav-link" href="index.html#section_5">Kontak</a></li>
                        </ul>

                        <!-- Wadah untuk Login/Logout dan Nama User -->
                        <div class="ms-lg-3 d-flex align-items-center">
                            <div id="authArea">
                                <button onclick="goLogin()" class="btn custom-btn custom-border-btn">Login</button>
                            </div>
                            <div id="userInfo" class="ms-2 text-white"></div>
                        </div>
                    </div>
                </div>
            </nav>
            
            <section class="booking-section section-padding">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-10 col-12 mx-auto">
                            <div class="booking-form-wrap">
                                <div class="row">
                                    <div class="col-lg-7 col-12 p-0">
                                        <!-- Form telah ditambahkan id="bookingForm" -->
                                        <form id="bookingForm" class="custom-form booking-form" action="#" method="post" role="form">
                                            <div class="text-center mb-4 pb-lg-2">
                                                <em class="text-white">Isi formulir pemesanan</em>
                                                <h2 class="text-white">Reservasi Meja</h2>
                                            </div>

                                            <div class="booking-form-body">
                                                <div class="row">
                                                    <div class="col-lg-6 col-12">
                                                        <input type="text" name="booking-form-name" id="booking-form-name" class="form-control" placeholder="Nama Lengkap" required>
                                                    </div>
                                                    <div class="col-lg-6 col-12">
                                                        <input type="tel" class="form-control" name="booking-form-phone" placeholder="No. Telepon: 08123456789" required>
                                                    </div>
                                                    <div class="col-lg-6 col-12">
                                                        <input class="form-control" type="time" name="booking-form-time" value="18:30">
                                                    </div>
                                                    <div class="col-lg-6 col-12">
                                                        <input type="date" name="booking-form-date" id="booking-form-date" class="form-control" required>
                                                    </div>
                                                    <div class="col-lg-12 col-12">
                                                        <input type="number" name="booking-form-number" id="booking-form-number" class="form-control" placeholder="Jumlah Orang" min="0" required>
                                                        <textarea name="booking-form-message" rows="3" class="form-control" id="booking-form-message" placeholder="Catatan (Opsional)"></textarea>
                                                    </div>
                                                    <div class="col-lg-4 col-md-10 col-8 mx-auto mt-2">
                                                        <button type="submit" class="form-control">Kirim Reservasi</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </form>

                                        <!-- Pesan Sukses dengan warna font putih agar terlihat jelas -->
<div id="successMessage" style="display: none; color: #ffffff; text-align: center; padding: 20px;">
    <h3 style="color: #ffffff;">Reservasi telah berhasil!</h3>
    <p style="color: #ffffff;">Terima kasih, kami akan menghubungi kamu segera.</p>
</div>

                                    </div>
                                    <div class="col-lg-5 col-12 p-0">
                                        <div class="booking-form-image-wrap">
                                            <img src="images/barman-with-fruits.jpg" class="booking-form-image img-fluid" alt="">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <footer class="site-footer">
                <div class="container">
                    <div class="row">
                    </div>
                </div>
            </footer>
        </main>

        <!-- JAVASCRIPT FILES -->
        <script src="js/jquery.min.js"></script>
        <script src="js/bootstrap.min.js"></script>
        <script src="js/jquery.sticky.js"></script>
        <script src="js/vegas.min.js"></script>
        <script src="js/custom.js"></script>
        <script src="login/js/welcome.js"></script>

        <!-- Script untuk menangani pengiriman formulir -->
        <script>
            document.getElementById("bookingForm").addEventListener("submit", function(event) {
                event.preventDefault(); // Mencegah reload halaman
                this.style.display = "none"; // Sembunyikan form
                document.getElementById("successMessage").style.display = "block"; // Tampilkan pesan
            });
        </script>
    </body>
</html>
